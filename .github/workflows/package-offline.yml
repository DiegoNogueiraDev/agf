name: package-offline

# Builds the self-contained, offline-installable bundles (one per OS, native deps
# bundled inside) via `bun run pack:offline`. Native modules (better-sqlite3) compile
# per-OS, so each runner produces its own platform's bundle. Artifacts are uploaded
# (and attached to the GitHub Release when triggered by one).
#
# Trigger manually (Actions → package-offline → Run workflow) or automatically when a
# Release is published. Requires GitHub Actions to be enabled/funded for the account.

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write # upload-artifact + attach .tgz to the release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: package-offline (self-hosted darwin-arm64)
    # Self-hosted runner is a single Mac — only the darwin bundle is produced.
    # For all-OS artifacts use `bun run pack:bun` (cross-compiles mac/linux/
    # windows from one host via the embedded bun:sqlite runtime).
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Put bun on PATH (user-local install on the server)
        run: echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Configure node-gyp (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp

      - name: Pre-build native deps (Windows)
        if: runner.os == 'Windows'
        run: npm install better-sqlite3 --build-from-source --legacy-peer-deps

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build offline bundle (bun run pack:offline)
        run: bun run pack:offline

      - name: Build cross-compile offline bundles (linux x64/arm64, darwin x64, win32 x64)
        run: bash scripts/gen-packages.sh all

      - name: Upload offline bundle artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agf-offline-darwin-arm64
          path: |
            dist-offline/agf-offline-*.tgz
            dist-offline/install-*.sh
            dist-offline/install.mjs
            dist-offline/README-OFFLINE.md
          if-no-files-found: error

      # install-agf.sh downloads a per-platform install-<platform>-<arch>.sh from
      # this exact release (node_4bb173755098) — the previous command only
      # uploaded the .tgz files, so install.sh/mjs never reached the release
      # asset list at all, regardless of naming.
      - name: Attach bundle to the Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist-offline/agf-offline-*.tgz \
            dist-offline/install-*.sh \
            dist-offline/install.mjs \
            --clobber
