name: DCO check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  dco:
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check DCO
        uses: christophebedard/dco-check@045160e1d11d727abb5424f6a234a1d9fdda7d22 # 0.6.0
        with:
          python-version: '3.12'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
