# Daily binary scan — publishes SCANINFO.json (release-trust artifact) next to
# BUILDINFO next to the built binaries. Runs on a hosted runner alongside
# package-bun so it can read the published binaries and write in place. VirusTotal is
# optional: without VT_API_KEY the verdict falls back to checksum+signature (never fails).
name: scan-binaries

on:
  schedule:
    - cron: '0 6 * * *' # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan-binaries:
    name: scan-binaries (publish SCANINFO to the GitHub Release)
    runs-on: ${{ vars.AGF_RUNNER_LABELS && fromJSON(vars.AGF_RUNNER_LABELS) || 'ubuntu-latest' }}
    env:
      # Path kept out of the public tree — see package-bun.yml.
      RELEASES_DIR: ${{ secrets.AGF_RELEASES_DIR || 'dist-bun' }}
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Put bun on PATH
        run: echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Scan published binaries → write SCANINFO.json
        run: |
          if [ ! -d "$RELEASES_DIR" ] || [ ! -f "$RELEASES_DIR/BUILDINFO" ]; then
            echo "::warning::$RELEASES_DIR/BUILDINFO absent — skipping (no build in this run)"
            exit 0
          fi
          bun src/cli/index.ts scan-binaries --out "$RELEASES_DIR"
          echo "--- published SCANINFO.json ---"
          cat "$RELEASES_DIR/SCANINFO.json"
