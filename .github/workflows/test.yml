name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    runs-on: [self-hosted]
    permissions:
      contents: read
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Detect changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'package.json'
              - 'tsconfig.json'
            ci:
              - '.github/workflows/**'
              - '.github/actions/**'

  test:
    name: test (self-hosted, Node ${{ matrix.node-version }})
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.ci == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        # Self-hosted runner is a single machine — the OS matrix is collapsed.
        # Keep the Node-major matrix; setup-node switches versions on the runner.
        node-version: [20, 22]
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Put bun on PATH (user-local install on the server)
        run: echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Configure node-gyp (Windows)
        if: runner.os == 'Windows'
        run: npm install -g node-gyp

      - name: Cache npm global packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Pre-build native deps (Windows)
        if: runner.os == 'Windows'
        run: npm install better-sqlite3 --build-from-source --legacy-peer-deps

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run CI checks (typecheck + lint + test:blast)
        run: bun run ci:smoke

      - name: Run test:blast (changed files)
        if: github.event_name == 'pull_request'
        run: bun run test:blast

      - name: Publish test reports
        if: always()
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6.4.2
        with:
          report_paths: junit.xml
          check_name: test results (self-hosted, Node ${{ matrix.node-version }})
          detailed_summary: true
          include_time_in_summary: true
          fail_on_failure: false

  # Validates the `npm install` path — `npm ci` + better-sqlite3 built from
  # source — which the main `test` job (bun) does not exercise. It used to fan
  # out over hosted ubuntu-latest + windows-latest; on a private repo those are
  # billed GitHub runners, and with CI required to be self-hosted they simply
  # never start. Collapsed to the one self-hosted machine we have.
  #
  # Coverage lost: the Windows native-build leg. We have no Windows runner, and a
  # job that can only fail is worse than an honest gap — tracked as node_1135de15f1da.
  native-install:
    name: native (self-hosted Linux, Node 22)
    needs: changes
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: node-modules-native-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            node-modules-native-${{ runner.os }}-

      - name: Install dependencies (npm, builds native better-sqlite3)
        run: npm ci

      - name: Run tests (native binary validation)
        run: npm test

  coverage:
    needs: [changes, test]
    if: ${{ needs.changes.outputs.src == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Put bun on PATH (user-local install on the server)
        run: echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Setup Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run coverage + quality gate
        run: bun run test:all

      - name: Architecture fitness gate
        # Threshold: current baseline 75%. Epic "Fix Architecture Fitness → 100%" tracks the climb.
        run: npx tsx src/cli/index.ts harness --gate --threshold 75

      - name: Quality gate — evaluateProjectQuality
        run: |
          npx tsx -e "
            const { evaluateProjectQuality } = require('./src/core/harness/project-quality.ts');
            const { collectSrcFiles } = require('./src/core/harness/collect-src.ts');
            const files = collectSrcFiles(process.cwd());
            const result = evaluateProjectQuality(files);
            if (!result.gate.passed) {
              console.error('QUALITY GATE FAILED:', JSON.stringify(result.gate.failures, null, 2));
              process.exit(1);
            }
            console.log('Quality gate passed:', JSON.stringify({ testScore: result.testScore, logScore: result.logScore }, null, 2));
          "

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/

  gatherer:
    needs: [changes, test]
    if: always()
    runs-on: [self-hosted]
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed or was skipped"
            exit 1
          fi
          echo "All checks passed"
