name: Feature Request
description: Propose a new feature or enhancement
title: '[Feature]: '
labels: ['enhancement', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Be specific.
      placeholder: "I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe your proposed solution in detail.
      placeholder: 'Add a new analyzer mode that [...]'
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you considered?
      placeholder: 'We could also [...] or work around this by [...]'
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, references, or screenshots.
