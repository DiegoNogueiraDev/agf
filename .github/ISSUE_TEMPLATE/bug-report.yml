name: Bug Report
description: File a bug report
title: '[Bug]: '
labels: ['bug', 'triage']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

        **Preflight Checklist** — please complete before submitting:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I am using the latest version
          required: true
        - label: I have checked the documentation for known issues
          required: true
        - label: I can reproduce the bug with a minimal example
          required: true
  - type: textarea
    id: current-behavior
    attributes:
      label: Current Behavior
      description: What actually happens?
      placeholder: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: Describe what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal reproduction case.
      placeholder: |
        1. Run `...`
        2. Call `...`
        3. See error
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime details.
      value: |
        - OS: 
        - Node.js version: 
        - npm version: 
        - agent-graph-flow version:
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Paste any error output, stack traces, or screenshots.
      render: shell
